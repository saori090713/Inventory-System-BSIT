<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Items - Inventory System</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="./css/bootstrap.min.css" rel="stylesheet">
    <link href="./css/style.css" rel="stylesheet">
</head>

<body data-page-type="items" class="bg-light">

    <div id="navbar-container"></div>

    <div class="container-fluid">
        <div class="row">

            <div id="sidebar-container"></div>

            <div class="col-md-10 p-4">
                <div id="alertContainer"></div>

                <div class="d-flex justify-content-between align-items-center mb-3 gap-2">
                    <input type="text" id="itemSearch" class="form-control border-secondary flex-grow-1" placeholder="Search items...">
                    <button id="addItemBtn" class="btn btn-success btn-lg" data-bs-toggle="modal" data-bs-target="#itemModal">
                        +
                    </button>
                </div>

                <div class="card shadow border-secondary">
                    <div class="card-body">
                        <table class="table table-bordered table-hover table-sm">
                            <thead class="table-light">
                                <tr>
                                    <th style="width: 5%;">ID</th>
                                    <th style="width: 20%;">Name</th>
                                    <th style="width: 15%;">Category</th>
                                    <th style="width: 10%;">Unit</th>
                                    <th style="width: 10%;">Qty</th>
                                    <th style="width: 15%;">Status</th>
                                    <th style="width: 25%;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="7" class="text-center text-muted py-4">No items</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Add/Edit Item Modal -->
    <div class="modal fade" id="itemModal" tabindex="-1" aria-labelledby="itemModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="itemModalLabel">Add Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="itemForm">
                        <div class="mb-3">
                            <label class="form-label">Item Name <span class="text-danger">*</span></label>
                            <input type="text" id="itemName" class="form-control border-secondary" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Category <span class="text-danger">*</span></label>
                            <select id="itemCategory" class="form-select border-secondary" required>
                                <option value="">Select Category</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Unit <span class="text-danger">*</span></label>
                            <select id="itemUnit" class="form-select border-secondary" required>
                                <option value="">Select Unit</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Quantity <span class="text-danger">*</span></label>
                            <input type="number" id="itemQuantity" class="form-control border-secondary" min="0" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Price</label>
                            <input type="number" id="itemPrice" class="form-control border-secondary" step="0.01" min="0">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1">Add Item</button>
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="./js/bootstrap.bundle.min.js"></script>

    <!-- Custom Scripts -->
    <script src="./js/auth.js"></script>
    <script src="./js/layout.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/js/main.js"></script>
    <script src="./js/js/items.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderLayout('items');
            window.itemsManager = new ItemsManager();
        });
    </script>
</body>

</html>
