<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="bg-light">

    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- Sidebar -->
            <div class="col-md-2 bg-success text-white p-3 d-flex flex-column shadow-sm"
                style="min-height: 100vh; max-width: 240px;">

                <h3 class="fw-bold mb-4">
                    <i class="fas fa-box me-2"></i> Inventory
                </h3>

                <!-- User + Logout -->
                <div class="mb-4">
                    <div class="d-flex align-items-center mb-1">
                        <span id="userName" class="fw-bold text-truncate"><i class="fas fa-user-circle me-2"></i>User</span>
                    </div>
                    <div class="d-flex align-items-center justify-content-between">
                        <span id="userRole" class="badge bg-light text-success">USER</span>
                        <button class="btn btn-warning btn-sm fw-bold" id="btnLogout" title="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>

                <ul class="nav flex-column gap-2">

                    <li><a class="nav-link text-white" href="dashboard.html">
                            <i class="fas fa-chart-line me-2"></i> Dashboard</a></li>

                    <li><a class="nav-link text-white" href="products.html">
                            <i class="fas fa-boxes me-2"></i> Products</a></li>

                    <li><a class="nav-link text-white" href="categories.html">
                            <i class="fas fa-tags me-2"></i> Categories</a></li>

                    <li><a class="nav-link text-white" href="units.html">
                            <i class="fas fa-balance-scale me-2"></i> Units</a></li>

                    <li><a class="nav-link active bg-light text-success fw-bold" href="users.html">
                            <i class="fas fa-users me-2"></i> Users</a></li>

                </ul>
            </div>

            <!-- Content -->
            <div class="col p-4">

                <div class="mb-4">
                    <h2 class="fw-bold">
                        <i class="fas fa-users text-success me-2"></i> Users
                    </h2>
                    <p class="text-muted">Manage system users and roles</p>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" placeholder="Search users...">
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-success">
                                <tr>
                                    <th><i class="fas fa-user me-1"></i> Username</th>
                                    <th><i class="fas fa-id-card me-1"></i> Full Name</th>
                                    <th><i class="fas fa-user-shield me-1"></i> Role</th>
                                    <th><i class="fas fa-toggle-on me-1"></i> Status</th>
                                    <th class="text-end"><i class="fas fa-cogs me-1"></i> Actions</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <tr>
                                    <td colspan="5" class="text-center py-4">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- User Role Modal -->
    <div class="modal fade" id="userModal" tabindex="-1" aria-labelledby="userModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="userModalLabel">Change User Role</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="userId">
                    <div class="mb-3">
                        <label for="userRoleSelect" class="form-label">Select Role</label>
                        <select class="form-select" id="userRoleSelect">
                            <option value="user">User</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-success">Update Role</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/js/main.js"></script>
    <script src="../js/js/api.js"></script>
    <script src="../js/js/users.js"></script>

</body>

</html>
