<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Inventory</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="bg-light">

    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- Sidebar -->
            <div class="col-md-2 bg-success text-white p-3 d-flex flex-column shadow-sm"
                style="min-height: 100vh; max-width: 220px;">

                <!-- Title -->
                <h3 class="fw-bold mb-4">
                    <i class="fas fa-box me-2"></i> Inventory
                </h3>

                <!-- User + Logout -->
                <div class="mb-4">
                    <div class="d-flex align-items-center mb-1">
                        <span id="userName" class="fw-bold text-truncate"><i class="fas fa-user-circle me-2"></i>User</span>
                    </div>
                    <div class="d-flex align-items-center justify-content-between">
                        <span id="userRole" class="badge bg-light text-success">USER</span>
                        <button class="btn btn-warning btn-sm fw-bold" id="btnLogout" title="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>

                <!-- Menu -->
                <ul class="nav flex-column nav-pills gap-2">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="dashboard.html">
                            <i class="fas fa-chart-line me-2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active bg-light text-success fw-bold" href="products.html">
                            <i class="fas fa-boxes me-2"></i> Products
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="categories.html">
                            <i class="fas fa-tags me-2"></i> Categories
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="units.html">
                            <i class="fas fa-balance-scale me-2"></i> Units
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="users.html">
                            <i class="fas fa-users me-2"></i> Users
                        </a>
                    </li>
                </ul>

            </div>

            <!-- Main Content -->
            <div class="col p-4" style="height: 100vh; overflow-y: auto;">

                <!-- Header -->
                <div class="row mb-4">
                    <div class="col-md-12">
                        <h2 class="fw-bold">Products</h2>
                        <p class="text-muted">Manage and view all inventory items</p>
                    </div>
                </div>

                <!-- Stats Cards -->
                <div class="row mb-4">

                    <div class="col-md-3 mb-3">
                        <div class="card text-center shadow-sm">
                            <div class="card-body">
                                <i class="fas fa-boxes text-primary mb-2" style="font-size: 32px;"></i>
                                <h6 class="text-muted">Total Products</h6>
                                <h3 id="totalProducts">0</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <div class="card text-center shadow-sm">
                            <div class="card-body">
                                <i class="fas fa-check-circle text-success mb-2" style="font-size: 32px;"></i>
                                <h6 class="text-muted">In Stock</h6>
                                <h3 id="inStockCount">0</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <div class="card text-center shadow-sm">
                            <div class="card-body">
                                <i class="fas fa-exclamation-circle text-warning mb-2" style="font-size: 32px;"></i>
                                <h6 class="text-muted">Low Stock</h6>
                                <h3 id="lowStockCount">0</h3>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3 mb-3">
                        <div class="card text-center shadow-sm">
                            <div class="card-body">
                                <i class="fas fa-times-circle text-danger mb-2" style="font-size: 32px;"></i>
                                <h6 class="text-muted">Out of Stock</h6>
                                <h3 id="outOfStockCount">0</h3>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Search and Add -->
                <div class="row mb-4">
                    <div class="col-md-6">
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-search"></i></span>
                            <input type="text" class="form-control" id="itemSearch" placeholder="Search items...">
                        </div>
                    </div>
                    <div class="col-md-6 text-end">
                        <button class="btn btn-success" id="addItemBtn">
                            <i class="fas fa-plus"></i> Add New Item
                        </button>
                    </div>
                </div>

                <!-- Items Table -->
                <div class="card shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-success">
                                <tr>
                                    <th>#</th>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Unit</th>
                                    <th>Stock</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="7" class="text-center py-4">
                                        <div class="spinner-border text-primary spinner-border-sm me-2"></div>
                                        Loading items...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Item Modal -->
    <div class="modal fade" id="itemModal" tabindex="-1" aria-labelledby="itemModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="itemModalLabel">Add New Item</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="itemForm">
                    <div class="modal-body">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="itemName" class="form-label">Item Name</label>
                                <input type="text" class="form-control" id="itemName" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="itemPrice" class="form-label">Price</label>
                                <input type="number" step="0.01" class="form-control" id="itemPrice" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="itemCategory" class="form-label">Category</label>
                                <select class="form-select" id="itemCategory" required>
                                    <option value="">Select Category</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="itemUnit" class="form-label">Unit</label>
                                <select class="form-select" id="itemUnit" required>
                                    <option value="">Select Unit</option>
                                </select>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="itemQuantity" class="form-label">Initial Quantity</label>
                                <input type="number" class="form-control" id="itemQuantity" required>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save Item</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/js/main.js"></script>
    <script src="../js/js/api.js"></script>
    <script src="../js/js/items.js"></script>
</body>

</html>
