<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Units</title>
    <link href="../css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="../css/main.css">
</head>

<body class="bg-light">

    <div class="container-fluid p-0">
        <div class="row g-0">

            <!-- Sidebar -->
            <div class="col-md-2 bg-success text-white p-3 d-flex flex-column shadow-sm"
                style="min-height: 100vh; max-width: 240px;">

                <h3 class="fw-bold mb-4">
                    <i class="fas fa-box me-2"></i> Inventory
                </h3>

                <!-- User + Logout -->
                <div class="mb-4">
                    <div class="d-flex align-items-center mb-1">
                        <span id="userName" class="fw-bold text-truncate"><i class="fas fa-user-circle me-2"></i>User</span>
                    </div>
                    <div class="d-flex align-items-center justify-content-between">
                        <span id="userRole" class="badge bg-light text-success">USER</span>
                        <button class="btn btn-warning btn-sm fw-bold" id="btnLogout" title="Logout">
                            <i class="fas fa-sign-out-alt"></i>
                        </button>
                    </div>
                </div>

                <ul class="nav flex-column gap-2">

                    <li><a class="nav-link text-white" href="dashboard.html">
                            <i class="fas fa-chart-line me-2"></i> Dashboard</a></li>

                    <li><a class="nav-link text-white" href="products.html">
                            <i class="fas fa-boxes me-2"></i> Products</a></li>

                    <li><a class="nav-link text-white" href="categories.html">
                            <i class="fas fa-tags me-2"></i> Categories</a></li>

                    <li><a class="nav-link active bg-light text-success fw-bold" href="units.html">
                            <i class="fas fa-balance-scale me-2"></i> Units</a></li>

                    <li><a class="nav-link text-white" href="users.html">
                            <i class="fas fa-users me-2"></i> Users</a></li>

                </ul>
            </div>

            <!-- Content -->
            <div class="col p-4">

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div>
                        <h2 class="fw-bold">
                            <i class="fas fa-balance-scale text-success me-2"></i> Units
                        </h2>
                        <p class="text-muted">Manage measurement units</p>
                    </div>

                    <button class="btn btn-success" id="addUnitBtn">
                        <i class="fas fa-plus"></i> Add Unit
                    </button>
                </div>

                <div class="mb-3">
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-search"></i></span>
                        <input type="text" class="form-control" id="unitSearch" placeholder="Search units...">
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-success">
                                <tr>
                                    <th><i class="fas fa-id-badge me-1"></i> ID</th>
                                    <th><i class="fas fa-ruler me-1"></i> Name</th>
                                    <th><i class="fas fa-sort-numeric-up me-1"></i> Abbreviation</th>
                                    <th class="text-end"><i class="fas fa-cogs me-1"></i> Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td colspan="3" class="text-center py-4">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Unit Modal -->
    <div class="modal fade" id="unitModal" tabindex="-1" aria-labelledby="unitModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-success text-white">
                    <h5 class="modal-title" id="unitModalLabel">Add Unit</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="unitForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="unitName" class="form-label">Unit Name</label>
                            <input type="text" class="form-control" id="unitName" required>
                        </div>
                        <div class="mb-3">
                            <label for="unitAbbreviation" class="form-label">Abbreviation</label>
                            <input type="text" class="form-control" id="unitAbbreviation" required>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-success">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="../js/bootstrap.bundle.min.js"></script>
    <script src="../js/js/main.js"></script>
    <script src="../js/js/api.js"></script>
    <script src="../js/js/units.js"></script>

</body>

</html>
